<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>3D Viewer</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #ddd;
    }

    model-viewer {
      width: 100%;
      height: 100vh;
      display: block;
    }
  </style>
</head>
<body>

<model-viewer 
  src="output.glb"
  auto-rotate 
  camera-controls
  camera-controls
  auto-rotate
  camera-target="0m 0m 0m"
  camera-orbit="0deg 90deg 1m"
  field-of-view="45deg"
  exposure="2"
  environment-image="neutral">
</model-viewer>

</body>
</html>
