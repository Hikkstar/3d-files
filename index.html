<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>3D Viewer</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #111;
    }
    model-viewer {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>
<body>

<model-viewer 
  src="output.glb"
  auto-rotate 
  camera-controls>
</model-viewer>

</body>
</html>
